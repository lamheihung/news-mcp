repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy type check
        entry: uv run mypy src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit security check
        entry: uv run bandit -r src tests -f txt -s B101
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest unit tests
        entry: uv run pytest tests
        language: system
        types: [python]
        pass_filenames: false
