name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Sync dependencies
        run: uv sync --group dev --group scrapers

      - name: Check lock file is up to date
        run: uv lock --locked

      - name: Check formatting
        run: uv run ruff format --check src tests

      - name: Run linter
        run: uv run ruff check src tests

      - name: Run type checker
        run: uv run mypy src tests

      - name: Run security scanner
        run: uv run bandit -r src tests -f txt -s B101

      - name: Run tests with coverage
        run: uv run pytest tests --cov=src --cov-report=term-missing

      - name: Runtime smoke test
        run: |
          timeout 5 uv run python main.py || [ $? -eq 124 ]
